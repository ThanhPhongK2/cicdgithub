name: CI/CD Workflow

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install client dependencies
        working-directory: ./client
        run: npm ci

      - name: Build client
        working-directory: ./client
        run: npm run build

      - name: Install server dependencies
        working-directory: ./server
        run: npm ci

      - name: Run server tests (nếu có)
        working-directory: ./server
        run: |
          if [ -f package.json ] && npm run | grep -q test; then
            npm test
          else
            echo "No test script found, skipping tests."
          fi

      - name: Docker build & push (tùy chọn, nếu có DockerHub)
        if: ${{ env.DOCKER_USERNAME && env.DOCKER_PASSWORD }}
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
          docker build -t "$DOCKER_USERNAME/app-client" ./client
          docker build -t "$DOCKER_USERNAME/app-server" ./server
          docker push "$DOCKER_USERNAME/app-client"
          docker push "$DOCKER_USERNAME/app-server"
