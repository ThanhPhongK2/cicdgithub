name: CI/CD Workflow

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Clean and install client dependencies
        working-directory: ./client
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Force install rollup native binary
        working-directory: ./client
        run: |
          npm install @rollup/rollup-linux-x64-gnu --save-optional

      - name: Build client
        working-directory: ./client
        run: npm run build

      - name: Install server dependencies
        working-directory: ./server
        run: npm install

      - name: Run server tests (nếu có)
        working-directory: ./server
        run: |
          if [ -f package.json ] && npm run | grep -q test; then
            npm test
          else
            echo "No test script found, skipping tests."
          fi

      - name: Docker build & push (tùy chọn, nếu có DockerHub)
        if: ${{ secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != '' }}
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
          docker build -t "$DOCKER_USERNAME/app-client" ./client
          docker build -t "$DOCKER_USERNAME/app-server" ./server
          docker push "$DOCKER_USERNAME/app-client"
          docker push "$DOCKER_USERNAME/app-server"

      # BACKEND
      - name: Create backend .env file
        working-directory: ./server
        run: |
          printf "%s" "${{ secrets.PROD_BACKEND_ENV }}" > .env

      - name: Install PM2 globally
        run: npm install -g pm2

      - name: Start backend with PM2
        working-directory: ./server
        run: |
          pm2 restart backend || pm2 start index.js --name backend
          pm2 save

      # FRONTEND
      - name: Clean npm cache & remove existing dependencies
        working-directory: ./client
        run: |
          rm -rf node_modules package-lock.json
          npm cache clean --force

      - name: Install frontend dependencies
        working-directory: ./client
        run: npm install

      - name: Create frontend .env file
        working-directory: ./client
        run: |
          printf "%s" "${{ secrets.PROD_FRONTEND_ENV }}" > .env

      - name: Build frontend
        working-directory: ./client
        run: npm run build

      - name: Deploy frontend to Nginx
        run: |
          sudo mkdir -p /var/www/html
          sudo rm -rf /var/www/html/*
          sudo cp -r ./client/dist/* /var/www/html/

      - name: Set permissions for Nginx static files
        run: |
          sudo chown -R www-data:www-data /var/www/html
          sudo chmod -R 755 /var/www/html

      - name: Restart or Start Nginx
        run: |
          if systemctl is-active --quiet nginx; then
            echo "🔁 Reloading nginx..."
            sudo systemctl reload nginx
          else
            echo "🚀 Nginx is not active. Starting nginx..."
            sudo systemctl start nginx
          fi

      - name: ✅ Deployment finished
        run: echo "✅ Deployment completed successfully!"
