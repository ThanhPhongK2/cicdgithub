name: CICD

on:
  push:
    branches: main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t thanhphongkm20/app-server ./server 

      - name: Push Docker image
        run: docker push thanhphongkm20/app-server:latest

      - name: Build Docker image for client
        run: docker build -t thanhphongkm20/app-client ./client

      - name: Push Docker image for client
        run: docker push thanhphongkm20/app-client:latest

  deploy:
    needs: build
    runs-on: self-hosted  # 💡 EC2 cần đăng ký self-hosted runner
    steps:
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Pull image from Docker Hub
        run: docker pull thanhphongkm20/app-server:latest 

      - name: Stop and remove old container and free port 5000
        run: |
          # Dừng container nếu đang dùng port 5000
          docker ps --filter "publish=5000" --format "{{.ID}}" | xargs -r docker rm -f
          # Hoặc cụ thể theo tên
          docker rm -f nodejs-app-container || true

      - name: Run Docker container
        run: docker run -d -p 5000:5000 --name nodejs-app-container thanhphongkm20/app-server:latest

      - name: Pull image for client
        run: docker pull thanhphongkm20/app-client:latest

      - name: Stop old client container
        run: docker rm -f react-client-container || true

      - name: Run client container
        run: docker run -d -p 3000:3000 --name react-client-container thanhphongkm20/app-client:latest
