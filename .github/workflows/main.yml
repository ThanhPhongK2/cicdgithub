name: Deploy on EC2 with Self-Hosted Runner

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Stop old containers
      run: |
        cd ~/cicdgithub
        docker-compose down

    - name: Pull latest code
      run: |
        cd ~/cicdgithub
        git pull origin main

    - name: Rebuild and restart containers
      run: |
        cd ~/cicdgithub
        docker-compose up --build -d
