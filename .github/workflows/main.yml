name: Deploy MERN App on EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      # 1. Checkout source code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Cài đặt Node.js
      - name: Install Node.js 16
        run: |
          curl -fsSL https://deb.nodesource.com/setup_16.x | sudo -E bash -
          sudo apt-get install -y nodejs
          node -v
          npm -v

      # 3. Cài đặt MongoDB (nếu cần)
      - name: Install MongoDB 8.0
        run: |
          sudo apt-get install -y gnupg curl
          curl -fsSL https://www.mongodb.org/static/pgp/server-8.0.asc | \
            sudo gpg -o /usr/share/keyrings/mongodb-server-8.0.gpg --dearmor
          echo "deb [ arch=amd64,arm64 signed-by=/usr/share/keyrings/mongodb-server-8.0.gpg ] https://repo.mongodb.org/apt/ubuntu noble/mongodb-org/8.0 multiverse" | \
            sudo tee /etc/apt/sources.list.d/mongodb-org-8.0.list
          sudo apt-get update
          sudo apt-get install -y mongodb-org
          sudo systemctl start mongod
          sudo systemctl enable mongod

      # 4. Cài PM2
      - name: Install PM2 globally
        run: sudo npm install -g pm2

      # 5. Cài đặt backend & chạy với PM2
      - name: Install backend dependencies
        working-directory: ./server
        run: npm install

      - name: Create backend .env file
        working-directory: ./server
        run: |
          printf "%s" "${{ secrets.PROD_BACKEND_ENV }}" > .env

      - name: Start backend with PM2
        working-directory: ./server
        run: |
          pm2 start index.js --name node-server || pm2 restart node-server
          pm2 save

      # 6. Cài đặt frontend & build
      - name: Install frontend dependencies
        working-directory: ./client
        run: npm install

      - name: Create frontend .env file
        working-directory: ./client
        run: |
          printf "%s" "${{ secrets.PROD_FRONTEND_ENV }}" > .env

      - name: Build frontend
        working-directory: ./client
        run: npm run build

      # 7. Cài Nginx và deploy frontend
      - name: Install and configure Nginx
        run: |
          sudo apt update
          sudo apt install -y nginx
          sudo rm -rf /var/www/html/*
          sudo cp -r ./client/dist/* /var/www/html/

      # 8. Cấu hình Nginx cho frontend + proxy backend
      - name: Update Nginx config
        run: |
          sudo bash -c 'cat > /etc/nginx/sites-available/default' <<EOF
          server {
            listen 80;
            server_name your-ec2-public-ip;

            root /var/www/html;
            index index.html;

            location / {
              try_files \$uri /index.html;
            }

            location /api/ {
              proxy_pass http://localhost:3000/;
              proxy_http_version 1.1;
              proxy_set_header Upgrade \$http_upgrade;
              proxy_set_header Connection 'upgrade';
              proxy_set_header Host \$host;
              proxy_cache_bypass \$http_upgrade;
            }
          }
          EOF
      # 9. Restart nginx
      - name: Restart Nginx
        run: |
          sudo nginx -t
          sudo systemctl restart nginx

      - name: ✅ Deployment Finished
        run: echo "🚀 MERN App deployed successfully!"
