name: CI/CD Workflow

on:
  push:
    branches:
      - main

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

jobs:
  build:
    runs-on: [self-hosted, ec2]

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v3

      - name: 🧾 Show environment info
        run: |
          echo "👤 User: $(whoami)"
          node -v
          npm -v
          docker -v || echo "⚠️ Docker not installed"
          pm2 -v || echo "⚠️ PM2 not installed"

      # CLIENT
      - name: 🧹 Clean and install client dependencies
        working-directory: ./client
        run: |
          rm -rf node_modules package-lock.json
          npm install
          npm install @rollup/rollup-linux-x64-gnu --save-optional

      - name: ⚙️ Create frontend .env file
        working-directory: ./client
        run: echo "${{ secrets.PROD_FRONTEND_ENV }}" > .env

      - name: 🛠️ Build frontend
        working-directory: ./client
        run: npm run build

      # SERVER
      - name: 📦 Install server dependencies
        working-directory: ./server
        run: npm install

      - name: 🧪 Run server tests
        working-directory: ./server
        run: |
          if [ -f package.json ] && npm run | grep -q test; then
            npm test
          else
            echo "ℹ️ No test script found, skipping tests."
          fi

      - name: ⚙️ Create backend .env file
        working-directory: ./server
        run: echo "${{ secrets.PROD_BACKEND_ENV }}" > .env

      - name: 🚀 Start backend with PM2
        working-directory: ./server
        run: |
          if ! command -v pm2 &> /dev/null; then
            echo "📦 Installing PM2..."
            npm install -g pm2
          fi
          pm2 restart backend || pm2 start index.js --name backend
          pm2 save

      # OPTIONAL: Docker
      - name: 🐳 Docker build & push (if secrets available)
        if: env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != ''
        run: |
          echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
          docker build -t "$DOCKER_USERNAME/app-client" ./client
          docker build -t "$DOCKER_USERNAME/app-server" ./server
          docker push "$DOCKER_USERNAME/app-client"
          docker push "$DOCKER_USERNAME/app-server"

      # DEPLOY FRONTEND
      - name: 🚚 Deploy frontend to Nginx
        run: |
          sudo mkdir -p /var/www/html
          sudo rm -rf /var/www/html/*
          sudo cp -r ./client/dist/* /var/www/html/
          sudo chown -R www-data:www-data /var/www/html
          sudo chmod -R 755 /var/www/html

      - name: 🔁 Restart or start Nginx
        run: |
          if systemctl is-active --quiet nginx; then
            echo "🔁 Reloading Nginx..."
            sudo systemctl reload nginx
          else
            echo "🚀 Starting Nginx..."
            sudo systemctl start nginx
          fi

      - name: ✅ Deployment finished
        run: echo "✅ CI/CD Deployment completed successfully!"
