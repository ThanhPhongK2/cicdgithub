name: Deploy on EC2 with Self-Hosted Runner

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Cleanup Docker before build
      run: docker system prune -a -f --volumes

    - name: Clean up local changes (optional but useful)
      run: |
        cd ~/cicdgithub
        git reset --hard HEAD
        git clean -fd

    - name: Stop old containers
      run: |
        cd ~/cicdgithub
        docker compose down

    - name: Pull latest code
      run: |
        cd ~/cicdgithub
        git pull origin main

    - name: Rebuild and restart containers
      run: |
        cd ~/cicdgithub
        docker compose up --build -d
