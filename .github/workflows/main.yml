name: Deploy MERN App on EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      # 1. Clone repo
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Cài Node.js 18
      - name: Install Node.js
        run: |
          curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash -
          sudo apt-get install -y nodejs
          node -v
          npm -v

      # 3. Cài MongoDB (nếu chưa có)
      - name: Install MongoDB
        run: |
          sudo apt-get install -y gnupg curl
          curl -fsSL https://www.mongodb.org/static/pgp/server-8.0.asc | gpg --dearmor --batch --yes | sudo tee /usr/share/keyrings/mongodb-server-8.0.gpg > /dev/null
          echo "deb [ arch=amd64,arm64 signed-by=/usr/share/keyrings/mongodb-server-8.0.gpg ] https://repo.mongodb.org/apt/ubuntu noble/mongodb-org/8.0 multiverse" | sudo tee /etc/apt/sources.list.d/mongodb-org-8.0.list
          sudo apt-get update
          sudo apt-get install -y mongodb-org
          sudo systemctl enable --now mongod

      # 4. Cài PM2 để chạy backend
      - name: Install PM2
        run: sudo npm install -g pm2

      # 5. Cài & chạy backend
      - name: Install backend dependencies
        working-directory: ./server
        run: npm install

      - name: Inject backend env
        working-directory: ./server
        run: |
          echo "${{ secrets.PROD_BACKEND_ENV }}" > .env

      - name: Start backend with PM2
        working-directory: ./server
        run: |
          pm2 describe node-server > /dev/null && pm2 restart node-server || pm2 start index.js --name node-server
          pm2 save

      # 6. Cài & build frontend
      - name: Clean & install frontend
        working-directory: ./client
        run: |
          rm -rf node_modules package-lock.json
          npm cache clean --force
          npm install

      - name: Inject frontend env
        working-directory: ./client
        run: |
          echo "${{ secrets.PROD_FRONTEND_ENV }}" > .env

      - name: Build frontend
        working-directory: ./client
        run: npm run build

      # 7. Cài NGINX & deploy frontend
      - name: Install & copy frontend to NGINX
        run: |
          sudo apt-get install -y nginx
          sudo rm -rf /var/www/html/*
          sudo cp -r ./client/dist/* /var/www/html/

      # 8. Cấu hình NGINX proxy đến backend
      - name: Configure NGINX
        run: |
          sudo tee /etc/nginx/sites-available/default > /dev/null << 'EOF'
          server {
              listen 80;
              server_name 43.206.111.4;

              root /var/www/html;
              index index.html;

              location / {
                  try_files $uri $uri/ /index.html;
              }

              location /api/ {
                  proxy_pass http://localhost:3000/api/;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade \$http_upgrade;
                  proxy_set_header Connection 'upgrade';
                  proxy_set_header Host \$host;
                  proxy_cache_bypass \$http_upgrade;
              }
          }
          EOF

      # 9. Restart NGINX
      - name: Restart NGINX
        run: |
          sudo nginx -t
          sudo systemctl restart nginx

      # 10. Done
      - name: ✅ Done
        run: echo "🚀 MERN App deployed successfully!"
