name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v3

      - name: 🐳 Docker Compose Up
        run: |
          docker compose down
          docker compose build
          docker compose up -d --remove-orphans
          docker image prune -f

      - name: ✅ Done
        run: echo "🚀 CI/CD hoàn tất!"
