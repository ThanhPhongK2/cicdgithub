name: Deploy App to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker (if private registry)
        if: ${{ secrets.DOCKER_USERNAME != '' }}
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker-compose build

      - name: Stop & remove old container
        run: docker-compose down || true

      - name: Run new container
        run: docker-compose up -d

      - name: Check running containers
        run: docker ps -a

      - name: Clean up unused Docker images (optional)
        run: docker image prune -af
        
      - name: Check health of app (optional)
        run: |
          sleep 5
          curl -f http://localhost:3000/health || (echo "Healthcheck failed!" && exit 1)
